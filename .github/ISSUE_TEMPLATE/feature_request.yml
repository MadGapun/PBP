name: "\U0001F4A1 Feature-Wunsch"
description: "Eine Idee oder Verbesserung vorschlagen"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Danke für deinen Vorschlag!

        PBP ist ein Community-Projekt — jede Idee hilft es besser zu machen.

        **Tipp für einen guten Feature-Wunsch:**
        Beschreibe zuerst das *Problem* das du hast, bevor du die Lösung vorschlägst.
        "Ich kann nicht X tun" ist oft hilfreicher als "Baut Feature Y ein" —
        manchmal gibt es bereits einen Weg, oder wir finden eine bessere Lösung.

  - type: dropdown
    id: area
    attributes:
      label: "Bereich *"
      description: In welchem Teil von PBP würde das Feature sitzen?
      options:
        - Dashboard (Web-UI im Browser)
        - MCP Tool / Claude-Integration
        - Jobsuche / Scraper
        - Bewerbungen
        - Profil / Lebenslauf
        - Export (PDF/DOCX)
        - Installation / Update
        - E-Mail Import
        - Statistiken
        - Einstellungen
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Welches Problem hast du? *"
      description: Beschreibe die Situation wo dir etwas fehlt oder schwerfällt. Je konkreter, desto besser.
      placeholder: |
        Beispiel: "Wenn ich die Stellenliste öffne, sind alle 40 Stellen
        durcheinander. Ich möchte sofort sehen welche Stellen am besten
        zu mir passen — aber ich muss jede einzeln anklicken."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: "Wie stellst du dir die Lösung vor? *"
      description: Deine Idee wie PBP das Problem lösen könnte. Skizzen oder Screenshots sind willkommen.
      placeholder: |
        Beispiel: "Ein Filter-Dropdown über der Stellenliste, wo ich
        nach Score, Gehalt oder Datum sortieren kann."
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "Wie oft würdest du das nutzen? *"
      description: Hilft uns bei der Priorisierung — wie viel Mehrwert bringt das Feature im Alltag?
      options:
        - "Täglich — wäre bei jeder PBP-Session relevant"
        - "Mehrmals pro Woche"
        - "Gelegentlich — aber würde mir einiges erleichtern"
        - "Einmalig / selten — wäre aber trotzdem sehr nützlich"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Was machst du aktuell stattdessen?
      description: Wie löst du das Problem heute? Gibt es einen Workaround? Das hilft uns den Druck hinter dem Wunsch zu verstehen.
      placeholder: |
        Beispiel: "Ich öffne jede Stelle manuell und mache mir Notizen
        in einer Excel-Tabelle nebenher."
    validations:
      required: false

  - type: input
    id: pbp_version
    attributes:
      label: PBP-Version
      description: Steht unten im Dashboard. Hilft uns zu wissen auf welchem Stand du bist.
      placeholder: "z.B. 1.5.0-beta.10"
    validations:
      required: false
