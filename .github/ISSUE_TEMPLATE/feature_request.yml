name: "\U0001F4A1 Feature-Wunsch"
description: "Eine Idee oder Verbesserung vorschlagen"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Hast du eine Idee wie PBP besser werden kann? Wir freuen uns über jeden Vorschlag!

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      description: Wo würde das Feature hingehören?
      options:
        - Dashboard (Web-UI)
        - MCP Tool / Claude-Integration
        - Jobsuche / Scraper
        - Bewerbungen
        - Profil / Lebenslauf
        - Export (PDF/DOCX)
        - Installation / Update
        - E-Mail Import
        - Statistiken
        - Einstellungen
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst dein Vorschlag?
      description: Beschreibe die Situation wo dir etwas fehlt oder schwerfällt.
      placeholder: "Ich möchte Bewerbungen nach Gehalt filtern können, aber..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Wie stellst du dir die Lösung vor?
      description: Beschreibe was PBP tun sollte.
      placeholder: "Ein Filter-Dropdown in der Stellenliste, das nach Gehaltsspanne sortiert."
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Wie oft würdest du das Feature nutzen?
      description: Hilft uns bei der Priorisierung.
      options:
        - "Täglich"
        - "Mehrmals pro Woche"
        - "Gelegentlich"
        - "Einmalig / selten"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Aktueller Workaround
      description: Wie löst du das Problem heute? Was machst du stattdessen?
    validations:
      required: false

  - type: input
    id: pbp_version
    attributes:
      label: PBP-Version
      description: Steht unten im Dashboard.
      placeholder: "z.B. 1.5.0-beta.10"
    validations:
      required: false
